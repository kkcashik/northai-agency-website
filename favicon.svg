<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a2a3a" rx="8"/>

  <!-- Gradient for shine effect -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e7bc4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- "N" letter -->
  <g fill="url(#grad)">
    <!-- Left vertical bar -->
    <rect x="14" y="16" width="8" height="32" rx="2"/>

    <!-- Right vertical bar -->
    <rect x="38" y="16" width="8" height="32" rx="2"/>

    <!-- Diagonal connector -->
    <path d="M 22 48 L 38 16" stroke="url(#grad)" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
